# project.dashboard.toml — project preset with extensive repository info
# (local git widgets + remote github widgets).

# ── Widgets ────────────────────────────────────────────────────────

[[widget]]
id = "hero"
fetcher = "git_repo_name"
render = { type = "text_ascii", style = "figlet", font = "ansi_shadow", color = "panel_title", align = "center" }

[[widget]]
id = "subtitle"
fetcher = "github_repo"
render = { type = "list_plain", align = "center" }

[[widget]]
id = "repo_stats"
fetcher = "github_repo_stars"
render = { type = "grid_table", layout = "inline", align = "center" }

[[widget]]
id = "local_status"
fetcher = "git_status"
render = { type = "grid_table" }

[[widget]]
id = "recent_commits"
fetcher = "git_recent_commits"
render = { type = "list_timeline" }

[[widget]]
id = "repo_age"
fetcher = "git_age"
render = { type = "text_plain", align = "center" }

[[widget]]
id = "stash_count"
fetcher = "git_stash_count"
render = { type = "status_badge", shape = "rounded", align = "center" }

[[widget]]
id = "repo_prs"
fetcher = "github_repo_prs"
render = { type = "list_links", max_items = 5 }

[[widget]]
id = "repo_issues"
fetcher = "github_repo_issues"
render = { type = "list_links", max_items = 5 }

[[widget]]
id = "commits_heatmap"
fetcher = "git_commits_activity"
render = "grid_heatmap"

[[widget]]
id = "top_contributors"
fetcher = "git_contributors"
render = { type = "chart_bar", max_bars = 5 }

[[widget]]
id = "languages"
fetcher = "github_languages"
render = { type = "chart_bar", horizontal = true }

[[widget]]
id = "releases"
fetcher = "github_recent_releases"
render = { type = "list_links", max_items = 3 }

# ── Layout ──────────────────────────────────────────────────────────

[[row]]
height = { length = 1 }
bg = "subtle"

[[row]]
height = { length = 7 }
bg = "subtle"
  [[row.child]]
  widget = "hero"

[[row]]
height = { length = 3 }
bg = "subtle"
flex = "center"
  [[row.child]]
  widget = "subtitle"
  width = { length = 70 }

[[row]]
height = { length = 1 }
bg = "subtle"
flex = "center"
  [[row.child]]
  widget = "repo_stats"
  width = { length = 70 }

[[row]]
height = { length = 1 }
bg = "subtle"

[[row]]
height = { length = 1 }

# Row 1: Local Repo age and stashes count
[[row]]
height = { length = 3 }
flex = "center"
gap = 2
  [[row.child]]
  widget = "repo_age"
  width = { length = 34 }
  border = "top"
  title = "  repo age  "
  title_align = "center"
  [[row.child]]
  widget = "stash_count"
  width = { length = 34 }
  border = "top"
  title = "  stashes  "
  title_align = "center"

[[row]]
height = { length = 1 }

# Row 2: Local working tree status and recent commits
[[row]]
height = { length = 8 }
flex = "center"
gap = 2
  [[row.child]]
  widget = "local_status"
  width = { length = 34 }
  border = "top"
  title = "  local status  "
  title_align = "center"
  [[row.child]]
  widget = "recent_commits"
  width = { length = 34 }
  border = "top"
  title = "  recent commits  "
  title_align = "center"

[[row]]
height = { length = 1 }

# Row 3: languages horizontal bar chart | releases timeline.
[[row]]
height = { length = 6 }
flex = "center"
gap = 2
  [[row.child]]
  widget = "languages"
  width = { length = 34 }
  border = "top"
  title = "  languages  "
  title_align = "center"
  [[row.child]]
  widget = "releases"
  width = { length = 34 }
  border = "top"
  title = "  released  "
  title_align = "center"

[[row]]
height = { length = 1 }

# Row 4: PRs | issues — two list_plain columns.
[[row]]
height = { length = 9 }
flex = "center"
gap = 2
  [[row.child]]
  widget = "repo_prs"
  width = { length = 34 }
  border = "top"
  title = "  PRs  "
  title_align = "center"
  [[row.child]]
  widget = "repo_issues"
  width = { length = 34 }
  border = "top"
  title = "  issues  "
  title_align = "center"

[[row]]
height = { length = 1 }

# Row 5: commits heatmap | top contributors.
[[row]]
height = { length = 10 }
flex = "center"
gap = 2
  [[row.child]]
  widget = "commits_heatmap"
  width = { length = 34 }
  border = "top"
  title = "  commits  "
  title_align = "center"
  [[row.child]]
  widget = "top_contributors"
  width = { length = 34 }
  border = "top"
  title = "  top contributors  "
  title_align = "center"
