# home.dashboard.toml — home preset with Dr Wario's Mean Token Machine and clock,
# plus GitHub user information and contributions activity.

# ── Widgets ────────────────────────────────────────────────────────

[[widget]]
id = "dr_wario_banner"
fetcher = "basic_static"
format = "Dr Wario's Mean Token Machine"
render = { type = "text_ascii", style = "figlet", font = "slant", color = "panel_title", align = "center" }

[[widget]]
id = "time_of_day"
fetcher = "clock"
render = { type = "text_ascii", style = "figlet", font = "standard", color = "text", align = "center" }

[[widget]]
id = "avatar"
fetcher = "github_avatar"
render = { type = "media_image", fit = "contain", max_width = 14, max_height = 7, align = "center" }

[[widget]]
id = "profile"
fetcher = "github_user"
render = { type = "list_plain", align = "left" }

[[widget]]
id = "contributions"
fetcher = "github_contributions"
render = { type = "grid_heatmap", align = "center" }

[[widget]]
id = "my_prs"
fetcher = "github_my_prs"
render = { type = "list_links", max_items = 4 }

[[widget]]
id = "review_queue"
fetcher = "github_review_requests"
render = { type = "list_links", max_items = 4 }

[[widget]]
id = "notifications"
fetcher = "github_notifications"
render = { type = "list_links", max_items = 5 }

# ── Layout ─────────────────────────────────────────────────────────

[[row]]
height = { length = 1 }

# Header Row 1: Banner
[[row]]
height = { length = 6 }
flex = "center"
  [[row.child]]
  widget = "dr_wario_banner"

# Header Row 2: Clock
[[row]]
height = { length = 6 }
flex = "center"
  [[row.child]]
  widget = "time_of_day"

[[row]]
height = { length = 1 }

# Header Row 3: avatar (fixed 16 cells tall-and-wide enough to read) + profile block
[[row]]
height = { length = 7 }
flex = "center"
  [[row.child]]
  widget = "avatar"
  width = { length = 16 }
  [[row.child]]
  widget = "profile"
  width = { length = 54 }

[[row]]
height = { length = 1 }

# Contributions heatmap: fits inside the 70-col band (≈ 35 weeks of data at 2 cells per day).
[[row]]
height = { length = 9 }
flex = "center"
  [[row.child]]
  widget = "contributions"
  width = { length = 70 }
  border = "top"
  title = "  contributions · last ~8 months  "
  title_align = "center"

[[row]]
height = { length = 1 }

[[row]]
height = { length = 5 }
flex = "center"
gap = 2
  [[row.child]]
  widget = "my_prs"
  width = { length = 34 }
  border = "top"
  title = "  my PRs  "
  title_align = "center"
  [[row.child]]
  widget = "review_queue"
  width = { length = 34 }
  border = "top"
  title = "  review queue  "
  title_align = "center"

[[row]]
height = { length = 1 }

[[row]]
height = { length = 7 }
flex = "center"
  [[row.child]]
  widget = "notifications"
  width = { length = 70 }
  border = "top"
  title = "  notifications  "
  title_align = "center"

[[row]]
height = { length = 1 }
